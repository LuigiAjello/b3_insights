<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Treino do Modelo — B3 Insight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <style>
    :root{
      --bg:#0a0d13; --panel:#121724; --panel-2:#161c2c; --border:#222a3d;
      --text:#e8ebf2; --muted:#8a93a8; --faint:#5b6479;
      --up:#34d399; --down:#f87171; --neutral:#5a6378;
      --accent:#5b9dff; --accent-2:#a78bfa; --warn:#fbbf24;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:radial-gradient(1200px 600px at 80% -10%,rgba(91,157,255,.08),transparent 60%),var(--bg);
      color:var(--text);font-family:'Inter',-apple-system,sans-serif;padding-bottom:5rem;-webkit-font-smoothing:antialiased}
    .nav{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;
      padding:.9rem 1.6rem;border-bottom:1px solid var(--border);background:rgba(10,13,19,.8);backdrop-filter:blur(10px)}
    .nav .brand{font-weight:800;letter-spacing:-.02em;display:flex;gap:.55rem;align-items:center;font-size:1.02rem}
    .nav .brand .dot{width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-2));box-shadow:0 0 14px var(--accent)}
    .nav .links{display:flex;gap:.3rem;flex-wrap:wrap}
    .nav .links a{color:var(--muted);text-decoration:none;font-size:.86rem;font-weight:500;padding:.4rem .75rem;border-radius:8px;transition:.15s}
    .nav .links a:hover{color:var(--text);background:var(--panel)}
    .nav .links a.active{color:var(--text);background:var(--panel-2);border:1px solid var(--border)}
    .wrap{max-width:1120px;margin:0 auto;padding:2rem 1.6rem}
    .eyebrow{color:var(--accent);font-weight:600;font-size:.78rem;letter-spacing:.08em;text-transform:uppercase}
    h1.title{font-size:2rem;font-weight:800;letter-spacing:-.03em;margin:.4rem 0 .5rem}
    .lead{color:var(--muted);max-width:680px;line-height:1.6;font-size:.96rem}
    .row{display:grid;gap:1.1rem}
    .cards-2{grid-template-columns:1fr 1fr}
    .cards-3{grid-template-columns:repeat(3,1fr)}
    .card{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--border);
      border-radius:16px;padding:1.4rem 1.5rem}
    .card h2{font-size:.92rem;font-weight:600;color:var(--text);margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
    .card .sub{color:var(--faint);font-size:.8rem;font-weight:400}
    .mt{margin-top:1.1rem}
    .stat{font-family:'JetBrains Mono',monospace;font-size:2.4rem;font-weight:600;line-height:1;letter-spacing:-.02em}
    .stat small{display:block;font-family:'Inter';font-size:.78rem;font-weight:500;color:var(--muted);margin-top:.5rem}
    .pill{display:inline-flex;align-items:center;gap:.4rem;padding:.32rem .7rem;border-radius:999px;font-size:.76rem;font-weight:600}
    .pill.ok{background:rgba(52,211,153,.12);color:var(--up);border:1px solid rgba(52,211,153,.28)}
    .pill.warn{background:rgba(251,191,36,.1);color:var(--warn);border:1px solid rgba(251,191,36,.28)}
    .stage{display:flex;flex-direction:column;gap:.7rem}
    .stage .top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem}
    .stage .roc{font-family:'JetBrains Mono',monospace;font-size:1.9rem;font-weight:600}
    .stage p{color:var(--muted);font-size:.86rem;line-height:1.5}
    .valid{display:flex;gap:.85rem;padding:.85rem 0;border-bottom:1px solid var(--border)}
    .valid:last-child{border-bottom:none}
    .valid .ic{flex:0 0 26px;height:26px;border-radius:7px;display:grid;place-items:center;font-size:.85rem;font-weight:700}
    .valid .ic.ok{background:rgba(52,211,153,.14);color:var(--up)}
    .valid .ic.warn{background:rgba(251,191,36,.14);color:var(--warn)}
    .valid .body strong{font-size:.9rem;display:block;margin-bottom:.15rem}
    .valid .body span{color:var(--muted);font-size:.83rem}
    .valid .body .res{font-family:'JetBrains Mono',monospace;color:var(--text);font-size:.82rem}
    .loading{text-align:center;color:var(--muted);padding:4rem}
    .foot{color:var(--faint);font-size:.78rem;text-align:center;margin-top:2rem}
    @media(max-width:820px){.cards-2,.cards-3{grid-template-columns:1fr}h1.title{font-size:1.6rem}}
  </style>
</head>
<body>
  <nav class="nav">
    <div class="brand"><span class="dot"></span> B3 Insight</div>
    <div class="links">
      <a href="/">Painel</a>
      <a href="/modelo">Reatividade</a>
      <a href="/treino" class="active">Treino</a>
      <a href="/prever">Prever</a>
    </div>
  </nav>

  <div class="wrap">
    <div id="content" class="loading">Carregando métricas do modelo…</div>
  </div>

  <script>
    const fmt = v => (v==null?'—':Number(v).toLocaleString('pt-BR'));
    const pct = v => v==null?'—':(Number(v)).toFixed(1).replace('.',',')+'%';
    const PLOT = {paper_bgcolor:'rgba(0,0,0,0)',plot_bgcolor:'rgba(0,0,0,0)',
      font:{color:'#8a93a8',family:'Inter',size:12},showlegend:false};
    const CFG = {displayModeBar:false,responsive:true};

    async function load(){
      let d;
      try{ d = await (await fetch('/api/treino')).json(); }
      catch(e){ return fail('Erro ao carregar.'); }
      if(!d.disponivel) return fail('Artefatos de treino ainda não publicados no S3 (o worker gera no próximo ciclo).');

      const e1=d.estagio1||{}, e2=d.estagio2||{}, sp=d.desempenho_split||{}, S=d.split||{};
      document.getElementById('content').innerHTML = `
        <div class="eyebrow">Modelo · ${d.modelo||'cascata XGBoost'}</div>
        <h1 class="title">Como o modelo foi treinado — e o que ele realmente consegue</h1>
        <p class="lead">${fmt(d.n_fatos)} fatos relevantes (${d.periodo?.inicio}–${d.periodo?.fim}), dos quais
          <b>${fmt(d.n_movers)}</b> (${pct(d.mexeu_rate)}) moveram o preço de forma anormal.
          Avaliação honesta por validação cruzada temporal — sem vazamento, sem otimismo.</p>

        <div class="row cards-2 mt">
          <div class="card stage">
            <div class="top">
              <div><span class="pill ok">✓ Confiável</span><div class="sub mt" style="margin-top:.6rem">Estágio 1 — Porteiro</div>
                <h2 style="margin:.2rem 0 0">O fato vai mexer no preço?</h2></div>
              <div style="text-align:right"><div class="roc" style="color:var(--up)">${(e1.roc_cv_temporal||'—').split('±')[0].trim()}</div>
                <div class="sub">ROC-AUC · CV temporal</div></div>
            </div>
            <p>Detecta com sinal real se um fato provoca reação anormal. Estável ao longo do tempo
               (${e1.roc_cv_temporal||'—'}); holdout ${e1.roc_holdout!=null?e1.roc_holdout:'—'}.</p>
          </div>
          <div class="card stage">
            <div class="top">
              <div><span class="pill warn">⚠ Experimental</span><div class="sub mt" style="margin-top:.6rem">Estágio 2 — Direção</div>
                <h2 style="margin:.2rem 0 0">Alta ou queda? (só nos movers)</h2></div>
              <div style="text-align:right"><div class="roc" style="color:var(--warn)">${(e2.roc_cv_temporal||'—').split('±')[0].trim()}</div>
                <div class="sub">ROC-AUC · CV temporal</div></div>
            </div>
            <p>Transparência total: ${e2.roc_cv_temporal||'—'} — instável. Os dados atuais
               <b>não permitem</b> prever a direção de forma confiável. Camada mostrada como experimental.</p>
          </div>
        </div>

        <div class="row cards-3 mt">
          <div class="card"><div class="stat" style="color:var(--text)">${fmt(S.treino)}<small>fatos de treino (${pct((S.fracao_treino||.85)*100)})</small></div></div>
          <div class="card"><div class="stat" style="color:var(--accent)">${fmt(S.teste)}<small>fatos de teste (holdout temporal)</small></div></div>
          <div class="card"><div class="stat" style="color:var(--up)">${sp.teste?(Number(sp.teste.roc).toFixed(3)):'—'}<small>ROC no holdout (nunca visto)</small></div></div>
        </div>

        <div class="row cards-2 mt">
          <div class="card"><h2>Validações <span class="sub">— cada afirmação foi testada</span></h2><div id="valids"></div></div>
          <div class="card"><h2>O que mais pesa na decisão <span class="sub">— top features (porteiro)</span></h2><div id="imp"></div></div>
        </div>

        <div class="card mt"><h2>Reatividade por categoria de fato <span class="sub">— % que mexem</span></h2><div id="cat"></div></div>

        <div class="foot">Gerado na AWS (Fargate) em ${d.gerado_em||'—'} · re-treino self-feeding semanal</div>
      `;

      // validações
      document.getElementById('valids').innerHTML = (d.validacoes||[]).map(v=>`
        <div class="valid">
          <div class="ic ${v.ok?'ok':'warn'}">${v.ok?'✓':'!'}</div>
          <div class="body"><strong>${v.nome}</strong>
            <span class="res">${v.resultado}</span><br><span>${v.veredito}</span></div>
        </div>`).join('');

      // importâncias
      const imp=(d.importancias||[]).slice().reverse();
      Plotly.newPlot('imp',[{type:'bar',orientation:'h',
        y:imp.map(x=>x.feature),x:imp.map(x=>x.peso),
        marker:{color:imp.map((_,i)=>`rgba(91,157,255,${.4+.6*i/imp.length})`)},
        hovertemplate:'%{y}: %{x:.3f}<extra></extra>'}],
        {...PLOT,height:Math.max(260,imp.length*26),margin:{t:6,r:14,b:24,l:180}},CFG);

      // por categoria
      const cat=(d.por_categoria||[]).slice().sort((a,b)=>a.pct-b.pct);
      Plotly.newPlot('cat',[{type:'bar',orientation:'h',
        y:cat.map(c=>c.categoria),x:cat.map(c=>c.pct),
        text:cat.map(c=>pct(c.pct)+'  ('+fmt(c.total)+')'),textposition:'auto',
        textfont:{color:'#cfd6e6'},marker:{color:'#a78bfa'},
        hovertemplate:'%{y}: %{x:.1f}%<extra></extra>'}],
        {...PLOT,height:Math.max(240,cat.length*34),margin:{t:6,r:14,b:30,l:120}},CFG);
    }
    function fail(m){document.getElementById('content').innerHTML=`<div class="loading">${m}</div>`;}
    load();
  </script>
</body>
</html>
